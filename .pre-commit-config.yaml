default_language_version:
  python: python3.12
repos:
- repo: https://github.com/PyCQA/flake8
  rev: "7.3.0"
  hooks:
  - id: flake8
    args: ["rbac"]
    pass_filenames: false
    require_serial: true
- repo: https://github.com/psf/black
  rev: 26.3.1
  hooks:
  - id: black
    args: ["--check", "-l", "119", "-t", "py312", "rbac", "tests", "--diff"]
    require_serial: true
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: debug-statements
- repo: https://github.com/adamchainz/django-upgrade
  rev: 1.30.0
  hooks:
    - id: django-upgrade
      args: [--target-version, "5.2"]
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.30.1
  hooks:
  - id: gitleaks
-   repo: https://github.com/python-openapi/openapi-spec-validator
    rev: 0.8.4
    hooks:
    -   id: openapi-spec-validator
        files: ^(docs/source/specs/|rbac/internal/specs/).*\.(yaml|yml|json)$
        exclude: (package(-lock)?\.json|tspconfig\.yaml|rbac/internal/specs/openapi\.json)$
- repo: local
  hooks:
  - id: typespec-openapi-drift
    name: Check TypeSpec/OpenAPI spec drift
    entry: bash -c 'export PATH="$PWD/docs/source/specs/typespec/node_modules/.bin:$PATH"; command -v tsp >/dev/null 2>&1 || { echo "WARNING - tsp not installed, skipping drift check"; exit 0; } && make generate_v2_spec && git diff --exit-code docs/source/specs/v2/ || { echo "ERROR - OpenAPI specs are out of date with main.tsp. Run make generate_v2_spec and commit the result."; exit 1; }'
    language: system
    files: (main\.tsp|docs/source/specs/v2/openapi\.(json|yaml))$
    pass_filenames: false
