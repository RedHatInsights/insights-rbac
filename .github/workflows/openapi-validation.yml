name: openapi-validate
on:
  push:
    branches:
      - master
    paths:
      - 'docs/source/specs/openapi.json'
      - 'docs/source/specs/v2/openapi.yaml'
      - 'docs/source/specs/v2/openapi.json'
      - '.redocly.yaml'
  pull_request:
    paths:
      - 'docs/source/specs/openapi.json'
      - 'docs/source/specs/v2/openapi.yaml'
      - 'docs/source/specs/v2/openapi.json'
      - '.redocly.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  openapi-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate OpenAPI specs
        run: |
          npx --yes @redocly/cli lint --config .redocly.yaml \
            docs/source/specs/openapi.json \
            docs/source/specs/v2/openapi.yaml \
            docs/source/specs/v2/openapi.json
